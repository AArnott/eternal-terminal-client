name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Single source of truth: Cargo.toml [package].version must match tag vX.Y.Z
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        name: Compare tag to Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' must look like vX.Y.Z (optional prerelease suffix)"
            exit 1
          fi
          EXPECTED="${TAG#v}"
          CARGO_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "git tag version : $EXPECTED"
          echo "Cargo.toml version: $CARGO_VER"
          if [[ "$EXPECTED" != "$CARGO_VER" ]]; then
            echo "::error::Tag v$EXPECTED does not match Cargo.toml version $CARGO_VER"
            echo "Bump [package].version in Cargo.toml, commit, then tag v\$version."
            exit 1
          fi
          echo "version=$CARGO_VER" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: et-x86_64-pc-windows-msvc.exe
            binary: et.exe
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: et-aarch64-pc-windows-msvc.exe
            binary: et.exe
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: et-x86_64-unknown-linux-gnu
            binary: et
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: et-aarch64-apple-darwin
            binary: et
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: et-x86_64-apple-darwin
            binary: et

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }}

      # Run tests only on host-native targets (cross-compiled binaries may not execute).
      - name: Test (native)
        if: |
          (runner.os == 'Windows' && matrix.target == 'x86_64-pc-windows-msvc') ||
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: cargo test --locked --release --target ${{ matrix.target }}

      - name: Verify PE version resources (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          $v = [System.Diagnostics.FileVersionInfo]::GetVersionInfo((Resolve-Path $exe))
          $expected = "${{ needs.verify-version.outputs.version }}"
          Write-Host "FileDescription : $($v.FileDescription)"
          Write-Host "ProductName     : $($v.ProductName)"
          Write-Host "ProductVersion  : $($v.ProductVersion)"
          Write-Host "FileVersion     : $($v.FileVersion)"
          Write-Host "LegalCopyright  : $($v.LegalCopyright)"
          Write-Host "Language        : $($v.Language)"
          Write-Host "Comments        : $($v.Comments)"
          if (-not $v.FileDescription) { throw "FileDescription is empty" }
          if (-not $v.ProductName) { throw "ProductName is empty" }
          if ($v.ProductVersion -ne $expected) {
            throw "ProductVersion '$($v.ProductVersion)' != Cargo/tag version '$expected'"
          }
          if ($v.FileVersion -notlike "$expected*") {
            throw "FileVersion '$($v.FileVersion)' does not start with '$expected'"
          }
          if (-not $v.LegalCopyright) { throw "LegalCopyright is empty" }
          $repo = "https://github.com/AArnott/eternal-terminal-client"
          if ($v.Comments -ne $repo) {
            throw "Comments (repo URL) expected '$repo', got '$($v.Comments)'"
          }
          # Custom StringFileInfo "Repository" via VerQueryValue
          Add-Type -TypeDefinition @"
using System;
using System.Runtime.InteropServices;
using System.Text;
public static class PeVer {
  [DllImport("version.dll", SetLastError=true, CharSet=CharSet.Unicode)]
  static extern bool GetFileVersionInfo(string f, int h, int s, byte[] d);
  [DllImport("version.dll", SetLastError=true, CharSet=CharSet.Unicode)]
  static extern int GetFileVersionInfoSize(string f, out int h);
  [DllImport("version.dll", SetLastError=true, CharSet=CharSet.Unicode)]
  static extern bool VerQueryValue(byte[] b, string sp, out IntPtr p, out uint l);
  public static string GetString(string path, string name) {
    int handle; int size = GetFileVersionInfoSize(path, out handle);
    if (size <= 0) throw new Exception("GetFileVersionInfoSize failed");
    byte[] buf = new byte[size];
    if (!GetFileVersionInfo(path, 0, size, buf)) throw new Exception("GetFileVersionInfo failed");
    IntPtr p; uint len;
    // Try common en-US code pages used in VERSIONINFO blocks
    string[] prefixes = { "\\StringFileInfo\\040904B0\\", "\\StringFileInfo\\040904E4\\" };
    foreach (var pre in prefixes) {
      if (VerQueryValue(buf, pre + name, out p, out len) && len > 1)
        return Marshal.PtrToStringUni(p);
    }
    return null;
  }
}
"@
          $customRepo = [PeVer]::GetString((Resolve-Path $exe), "Repository")
          Write-Host "Repository      : $customRepo"
          if ($customRepo -ne $repo) {
            throw "Custom property Repository expected '$repo', got '$customRepo'"
          }

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          $hash = (Get-FileHash "dist/${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/${{ matrix.artifact }}.sha256" -Value "$hash  ${{ matrix.artifact }}" -NoNewline

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"
          (cd dist && shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
