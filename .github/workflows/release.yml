name: Release

# Only run for version tags (not ordinary branch pushes).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Single source of truth: Cargo.toml [package].version must match tag vX.Y.Z
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: ver
        name: Compare tag to Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' must look like vX.Y.Z (optional prerelease suffix)"
            exit 1
          fi
          EXPECTED="${TAG#v}"
          CARGO_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "git tag version : $EXPECTED"
          echo "Cargo.toml version: $CARGO_VER"
          if [[ "$EXPECTED" != "$CARGO_VER" ]]; then
            echo "::error::Tag v${EXPECTED} does not match Cargo.toml version ${CARGO_VER}"
            echo "Bump [package].version in Cargo.toml, commit, then tag v${CARGO_VER}."
            exit 1
          fi
          echo "version=${CARGO_VER}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: et-x86_64-pc-windows-msvc.exe
            binary: et.exe
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: et-aarch64-pc-windows-msvc.exe
            binary: et.exe
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: et-x86_64-unknown-linux-gnu
            binary: et
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: et-aarch64-apple-darwin
            binary: et
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: et-x86_64-apple-darwin
            binary: et

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }}

      # Run tests only on host-native targets (cross-compiled binaries may not execute).
      - name: Test (native)
        if: |
          (runner.os == 'Windows' && matrix.target == 'x86_64-pc-windows-msvc') ||
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: cargo test --locked --release --target ${{ matrix.target }}

      - name: Verify PE version resources (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          .\.github\scripts\verify-pe-version.ps1 `
            -ExePath "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -ExpectedVersion "${{ needs.verify-version.outputs.version }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          $hash = (Get-FileHash "dist/${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/${{ matrix.artifact }}.sha256" -Value "$hash  ${{ matrix.artifact }}" -NoNewline

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"
          (cd dist && shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
